name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > surveycontroller.jks
          echo "Keystore decoded: $(stat -c%s surveycontroller.jks) bytes"

      - name: Build release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$apk_path")" >> "$GITHUB_OUTPUT"
          echo "Found APK: $apk_path"

      - name: Rename APK to include version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv "${{ steps.apk.outputs.path }}" "app/build/outputs/apk/release/SurveyController-${GITHUB_REF_NAME}.apk"
          echo "Renamed to SurveyController-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact (workflow_dispatch only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: SurveyController-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
